<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Smart Maintenance | Pro</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app-container">
    <nav class="top-nav">
      <div class="nav-brand">
        <i data-lucide="settings-2"></i>
        <span>Smart<strong>Fix</strong></span>
      </div>
      <div class="system-indicator">
        <div class="dot pulse"></div>
        <span id="systemStatus">กำลังเตรียมระบบ...</span>
      </div>
    </nav>

    <header class="main-header">
      <div class="header-content">
        <h1>บันทึกงานซ่อมบำรุง</h1>
        <p>บันทึกข้อมูลการซ่อมเครื่องจักรให้เป็นระบบ Digital 100%</p>
      </div>
    </header>

    <main class="content-layout">
      <form id="repairForm" class="modern-form" novalidate>
        
        <div class="form-section">
          <div class="section-header">
            <div class="icon-box"><i data-lucide="user"></i></div>
            <h3>1. ข้อมูลพื้นฐานการปฏิบัติงาน</h3>
          </div>
          <div class="grid-container">
            <div class="input-group">
              <label><i data-lucide="calendar"></i> วันที่ซ่อม</label>
              <input type="date" id="repairDate" name="repairDate" required />
            </div>
            <div class="input-group">
              <label><i data-lucide="clock"></i> กะการทำงาน</label>
              <select id="shift" name="shift" required>
                <option value="">-- เลือกกะ --</option>
                <option value="A">กะ A (เช้า)</option>
                <option value="B">กะ B (ดึก)</option>
                <option value="O">กะ O (พิเศษ)</option>
              </select>
            </div>
            <div class="input-group">
              <label><i data-lucide="fingerprint"></i> รหัสพนักงาน</label>
              <input type="text" id="technicianId" placeholder="พิมพ์รหัส เช่น 680470" required />
            </div>
            <div class="input-group">
              <label><i data-lucide="user-check"></i> ชื่อช่างผู้รับผิดชอบ</label>
              <input type="text" id="technicianName" class="readonly-input" readonly placeholder="ระบบจะดึงชื่ออัตโนมัติ" />
            </div>
          </div>
        </div>

        <div class="form-section">
          <div class="section-header">
            <div class="icon-box"><i data-lucide="cpu"></i></div>
            <h3>2. รายละเอียดเครื่องจักร</h3>
          </div>
          <div class="grid-container">
            <div class="input-group">
              <label>ชื่อเครื่องจักร</label>
              <select id="machine" name="machine" required>
                <option value="">-- โหลดรายการเครื่องจักร --</option>
              </select>
            </div>
            <div class="input-group">
              <label>หมายเลขเครื่อง</label>
              <select id="machineNo" name="machineNo" required disabled>
                <option value="">-- เลือกเครื่องจักรก่อน --</option>
              </select>
            </div>
            <div class="input-group">
              <label>ไลน์ผลิต (Line)</label>
              <input type="text" id="line" class="readonly-input" readonly placeholder="ดึงข้อมูลอัตโนมัติ" />
            </div>
            <div class="input-group">
              <label>จุดที่เสีย (Area Point)</label>
              <select id="areaPoint" name="areaPoint" required disabled>
                <option value="">-- เลือกหมายเลขเครื่องก่อน --</option>
              </select>
            </div>
          </div>
        </div>

        <div class="form-section full-width">
          <div class="section-header">
            <div class="icon-box"><i data-lucide="wrench"></i></div>
            <h3>3. การวิเคราะห์และการแก้ไข</h3>
          </div>
          <div class="grid-container">
            <div class="input-group">
              <label>อาการที่พบ</label>
              <select id="problem" name="problem" required>
                 <option value="">-- โหลดรายการอาการ --</option>
              </select>
            </div>
            <div class="input-group">
              <label>ประเภทงานเสีย</label>
              <input type="text" id="breakdownType" class="readonly-input" readonly placeholder="ดึงข้อมูลอัตโนมัติ" />
            </div>
            <div class="input-group">
              <label>สาเหตุที่พบ</label>
              <select id="cause" name="cause" required>
                <option value="">-- โหลดรายการสาเหตุ --</option>
              </select>
            </div>
            <div class="input-group">
              <label>การแก้ไข</label>
              <select id="action" name="action" required>
                <option value="">-- โหลดรายการแก้ไข --</option>
              </select>
            </div>
            <div class="input-group full-width mt-10">
              <label>ระดับความรุนแรง</label>
              <div class="radio-group">
                <input type="radio" name="severity" value="เล็กน้อย" id="sev1"> <label for="sev1">เล็กน้อย</label>
                <input type="radio" name="severity" value="ปานกลาง" id="sev2"> <label for="sev2">ปานกลาง</label>
                <input type="radio" name="severity" value="รุนแรง" id="sev3"> <label for="sev3">รุนแรง</label>
              </div>
            </div>
          </div>
        </div>

        <div class="form-section">
          <div class="section-header">
            <div class="icon-box"><i data-lucide="timer"></i></div>
            <h3>4. สรุปเวลาและผลการซ่อม</h3>
          </div>
          <div class="grid-container">
            <div class="input-group">
              <label>เวลาเริ่มซ่อม</label>
              <input type="time" id="startRepair" />
            </div>
            <div class="input-group">
              <label>เวลาซ่อมเสร็จ</label>
              <input type="time" id="endRepair" />
            </div>
            <div class="input-group">
              <label>Downtime (นาที)</label>
              <input type="number" id="lossTime" class="highlight-input" placeholder="คำนวณอัตโนมัติ" />
            </div>
            <div class="input-group">
              <label>สถานะหลังซ่อม</label>
              <select id="result" name="result" required>
                <option value="">-- เลือกสถานะ --</option>
                <option value="ใช้งานได้ปกติ">✅ ใช้งานได้ปกติ</option>
                <option value="ใช้งานได้ชั่วคราว">⚠️ ใช้งานได้ชั่วคราว</option>
                <option value="ต้องติดตามต่อ">👀 ต้องติดตามต่อ</option>
                <option value="รอซ่อมเพิ่มเติม">⏳ รอซ่อมเพิ่มเติม</option>
              </select>
            </div>
            <div class="input-group full-width mt-10">
              <label>อะไหล่ที่ใช้ (ถ้ามี)</label>
              <input type="text" id="sparePart" placeholder="เช่น Heater / Sensor / O-Ring" />
            </div>
            <div class="input-group full-width mt-10">
              <label>หมายเหตุเพิ่มเติม</label>
              <textarea id="remark" rows="3" placeholder="ระบุรายละเอียดเพิ่มเติมที่ต้องการบันทึก..."></textarea>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button type="button" id="resetBtn" class="btn-outline">ล้างฟอร์ม</button>
          <button type="submit" id="submitBtn" class="btn-primary">
            <span>ส่งข้อมูลบันทึกงาน</span>
            <i data-lucide="send"></i>
          </button>
        </div>
      </form>
    </main>
  </div>

  <script>
    // Initialize Lucide Icons
    lucide.createIcons();
  </script>
  <script src="app.js"></script>
</body>
</html>
